default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("PALKRES_DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("PALKRES_DB_PORT", 5432) %>
  username: <%= ENV.fetch("PALKRES_DB_USER", "palkres") %>
  password: <%= ENV.fetch("PALKRES_DB_PASSWORD") %>

development:
  <<: *default
  database: palkres_eshop_development

test:
  <<: *default
  database: palkres_eshop_test

production:
  primary: &primary_production
    <<: *default
    database: palkres_eshop_production
  cache:
    <<: *primary_production
    database: palkres_eshop_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: palkres_eshop_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: palkres_eshop_production_cable
    migrations_paths: db/cable_migrate
